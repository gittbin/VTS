<!-- src/main/resources/static/login.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTS — Đăng nhập</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #15110E;
            --surface: #1E1916;
            --surface-2: #2A2219;
            --border: #3A2F25;
            --text: #F3EAE0;
            --text-dim: #A89A8B;
            --accent: #FF7A5C;
            --accent-2: #FFB14E;
            --danger: #FF5A52;
            --ok: #5BD18B;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 24px; position: relative; overflow: hidden;
        }
        /* Quầng sáng tạo chiều sâu cho nền */
        body::before {
            content: ''; position: absolute; inset: 0; z-index: 0;
            background:
                    radial-gradient(620px circle at 18% 12%, rgba(255,122,92,0.18), transparent 60%),
                    radial-gradient(560px circle at 88% 86%, rgba(255,177,78,0.10), transparent 55%);
        }
        body::after {
            content: ''; position: absolute; inset: 0; z-index: 0; opacity: 0.4;
            background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 22px 22px;
        }
        .card {
            position: relative; z-index: 1; width: 100%; max-width: 410px;
            background: linear-gradient(180deg, var(--surface), #1B1613);
            border: 1px solid var(--border); border-radius: 22px;
            padding: 40px 34px; box-shadow: 0 30px 70px -20px rgba(0,0,0,0.7);
            animation: rise .7s cubic-bezier(.2,.8,.2,1) both;
        }
        @keyframes rise { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: none; } }

        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
        .mark {
            width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            display: grid; place-items: center; box-shadow: 0 8px 24px -6px rgba(255,122,92,0.5);
        }
        .mark svg { width: 22px; height: 22px; }
        .brand h1 {
            font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800;
            font-size: 26px; letter-spacing: -0.5px;
        }
        .tagline { color: var(--text-dim); font-size: 14px; margin-bottom: 26px; }

        .tabs { display: flex; gap: 6px; background: var(--bg); padding: 5px;
            border-radius: 12px; margin-bottom: 24px; border: 1px solid var(--border); }
        .tab {
            flex: 1; padding: 9px; border: 0; background: transparent; cursor: pointer;
            color: var(--text-dim); font-family: inherit; font-weight: 600; font-size: 14px;
            border-radius: 8px; transition: all .2s;
        }
        .tab.active { background: var(--surface-2); color: var(--text); }

        form { display: none; flex-direction: column; gap: 14px; }
        form.active { display: flex; animation: fade .35s ease both; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        .field label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; font-weight: 500; }
        .field input {
            width: 100%; padding: 12px 14px; background: var(--bg); color: var(--text);
            border: 1px solid var(--border); border-radius: 10px; font-family: inherit; font-size: 15px;
            transition: border-color .2s, box-shadow .2s;
        }
        .field input::placeholder { color: #6A5D4F; }
        .field input:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255,122,92,0.15);
        }
        .btn {
            margin-top: 6px; padding: 13px; border: 0; border-radius: 11px; cursor: pointer;
            font-family: inherit; font-weight: 700; font-size: 15px; color: #2A1206;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            transition: transform .15s, box-shadow .2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 28px -8px rgba(255,122,92,0.55); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

        .msg { font-size: 13.5px; padding: 10px 12px; border-radius: 9px; display: none; }
        .msg.show { display: block; }
        .msg.error { background: rgba(255,90,82,0.12); color: #FF8C85; border: 1px solid rgba(255,90,82,0.3); }
        .msg.success { background: rgba(91,209,139,0.12); color: var(--ok); border: 1px solid rgba(91,209,139,0.3); }
    </style>
</head>
<body>
<div class="card">
    <div class="brand">
        <div class="mark">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="2.5" y="6" width="12" height="12" rx="3" fill="#2A1206"/>
                <path d="M16 10.5L21 7.5V16.5L16 13.5V10.5Z" fill="#2A1206"/>
            </svg>
        </div>
        <h1>VTS</h1>
    </div>
    <p class="tagline">Gọi video trực tiếp, ngay trên trình duyệt.</p>

    <div class="tabs">
        <button class="tab active" data-tab="login">Đăng nhập</button>
        <button class="tab" data-tab="register">Đăng ký</button>
    </div>

    <div id="msg" class="msg"></div>

    <!-- ĐĂNG NHẬP -->
    <form id="loginForm" class="active">
        <div class="field">
            <label>Tên đăng nhập</label>
            <input name="username" placeholder="vd: alice" required>
        </div>
        <div class="field">
            <label>Mật khẩu</label>
            <input name="password" type="password" placeholder="••••••••" required>
        </div>
        <button class="btn" type="submit">Đăng nhập</button>
    </form>

    <!-- ĐĂNG KÝ -->
    <form id="registerForm">
        <div class="field">
            <label>Tên đăng nhập</label>
            <input name="username" placeholder="3–30 ký tự" minlength="3" maxlength="30" required>
        </div>
        <div class="field">
            <label>Tên hiển thị</label>
            <input name="displayName" placeholder="vd: Alice Nguyễn" required>
        </div>
        <div class="field">
            <label>Email <span style="opacity:.6">(không bắt buộc)</span></label>
            <input name="email" type="email" placeholder="alice@email.com">
        </div>
        <div class="field">
            <label>Mật khẩu</label>
            <input name="password" type="password" placeholder="tối thiểu 6 ký tự" minlength="6" required>
        </div>
        <button class="btn" type="submit">Tạo tài khoản</button>
    </form>
</div>

<script src="/js/auth.js"></script>
<script>
    // Đã đăng nhập rồi thì khỏi vào lại trang login
    if (Auth.isLoggedIn()) window.location.href = '/index.html';

    const msg = document.getElementById('msg');
    function showMsg(text, type) {
        msg.textContent = text;
        msg.className = 'msg show ' + type;
    }

    // Chuyển tab
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const which = tab.dataset.tab;
            document.getElementById('loginForm').classList.toggle('active', which === 'login');
            document.getElementById('registerForm').classList.toggle('active', which === 'register');
            msg.className = 'msg';
        });
    });

    async function submit(form, url, e) {
        e.preventDefault();
        const btn = form.querySelector('.btn');
        btn.disabled = true;
        const body = Object.fromEntries(new FormData(form).entries());
        try {
            const res = await Auth.apiFetch(url, { method: 'POST', body: JSON.stringify(body) });
            const data = await res.json();
            if (!res.ok) {
                showMsg(data.message || 'Có lỗi xảy ra', 'error');
                return;
            }
            Auth.saveSession(data);
            showMsg('Thành công! Đang chuyển hướng…', 'success');
            setTimeout(() => window.location.href = '/index.html', 500);
        } catch (err) {
            showMsg('Không kết nối được máy chủ', 'error');
        } finally {
            btn.disabled = false;
        }
    }

    document.getElementById('loginForm')
        .addEventListener('submit', e => submit(e.target, '/api/auth/login', e));
    document.getElementById('registerForm')
        .addEventListener('submit', e => submit(e.target, '/api/auth/register', e));
</script>
</body>
</html>
